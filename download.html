function pickLang() {
  try {
    const saved = localStorage.getItem('psygames_lang');
    if (saved === 'ru' || saved === 'en') return saved;
  } catch {}
  const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return nav.startsWith('ru') ? 'ru' : 'en';
}

let currentLang = pickLang();

function applyLang(lang) {
  currentLang = lang;
  const dict = I18N[lang];
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach((el) => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach((el) => {
    const key = el.getAttribute('data-i18n-html');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.querySelectorAll('.dl-card').forEach((el) => {
    el.setAttribute('data-for-you', dict.for_you);
  });
  document.querySelectorAll('.lang-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  try { localStorage.setItem('psygames_lang', lang); } catch {}
}

function detectOsAndHighlight() {
  const ua = navigator.userAgent;
  let os = null;
  if (/Macintosh|Mac OS X/.test(ua) && !/iPhone|iPad/.test(ua)) os = 'mac';
  else if (/Windows/.test(ua)) os = 'win';
  else if (/Android/.test(ua)) os = 'android';
  else if (/iPhone|iPad|iPod/.test(ua)) os = 'web';
  if (os) {
    const el = document.getElementById('dl-' + os);
    if (el) el.classList.add('highlight');
  }
}

applyLang(currentLang);
detectOsAndHighlight();

document.querySelectorAll('.lang-btn').forEach((btn) => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

fetch('https://api.github.com/repos/donosov999-ai/psygames-native/releases/latest')
  .then((r) => r.ok ? r.json() : Promise.reject(r.status))
  .then((data) => {
    const dateLocale = currentLang === 'ru' ? 'ru-RU' : 'en-US';
    document.getElementById('version').textContent =
      data.tag_name + ' · ' + new Date(data.published_at).toLocaleDateString(dateLocale);
    const findAsset = (pattern) => data.assets.find((a) => pattern.test(a.name));
    const macAsset = findAsset(/macos.*\.tar\.gz$/);
    const winExeAsset = findAsset(/setup\.exe$/);
    const apkAsset = findAsset(/\.apk$/);
    if (macAsset) {
      document.getElementById('dl-mac').href = macAsset.browser_download_url;
      document.getElementById('meta-mac').textContent = formatSize(macAsset.size);
    }
    if (winExeAsset) {
      document.getElementById('dl-win').href = winExeAsset.browser_download_url;
      document.getElementById('meta-win').textContent = formatSize(winExeAsset.size);
    }
    if (apkAsset) {
      document.getElementById('dl-android').href = apkAsset.browser_download_url;
      document.getElementById('meta-android').textContent = formatSize(apkAsset.size);
    }
  })
  .catch((err) => {
    document.getElementById('version').textContent = currentLang === 'ru' ? 'Перейти на GitHub' : 'Open GitHub';
    console.warn('Could not fetch latest release:', err);
  });

function formatSize(bytes) {
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}
